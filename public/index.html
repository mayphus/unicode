<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unicode Map</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="map" aria-label="Unicode code point map"></canvas>
      <button id="fit-button" type="button" aria-label="Return to full Unicode map">Home</button>
      <div id="hud" aria-live="polite">Loading</div>
      <input id="font-file" type="file" accept=".ttf,.otf,.woff,.woff2,font/*" hidden />
    </main>
    <script src="app.js"></script>
  </body>
</html>
